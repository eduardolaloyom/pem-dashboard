// === HEALTH SCORE (0-100, lower=better) ===
function healthScore(client){
  const tasks=clientTasks(client).filter(isActive);
  if(!tasks.length)return{score:100,label:'Sin tareas',color:'var(--green)'};
  const blocked=tasks.filter(t=>t.Estado.includes('Bloqueado')).length;
  const overdue=tasks.filter(isOverdue).length;
  const total=tasks.length;
  const completed=clientTasks(client).filter(t=>t.Estado.includes('Completado')).length;
  const allTasks=clientTasks(client).length;
  const progress=allTasks>0?(completed/allTasks)*100:0;
  // Score: blocked+overdue penalize heavily, low progress penalizes
  let score=100-progress;
  score+=blocked*25;
  score+=overdue*15;
  score=Math.max(0,Math.min(100,Math.round(score)));
  const color=score<=30?'var(--green)':score<=60?'var(--orange)':'var(--red)';
  const label=score<=30?'Saludable':score<=60?'AtenciÃ³n':'CrÃ­tico';
  return{score,label,color};
}

  const tasks=clientTasks(client).filter(t=>isActive(t)&&t.Fase);
  if(!tasks.length)return'Sin fase activa';
  const indices=tasks.map(t=>DATA.phases.indexOf(t.Fase)).filter(i=>i>=0);
  const max=Math.max(...indices);
  return DATA.phases[max]||'â';
}

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=pages.map(p=>{
    const label=pageLabels[p]||p;
    const isClient=DATA.clients.includes(p);
    const dot=isClient?'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+DATA.clientColors[p]+';margin-right:4px"></span>':'';
    return'<button class="tab" data-page="'+p.replace(/\s/g,'-')+'">'+dot+label+'</button>';
  }).join('');
  nav.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick=()=>showPage(tab.dataset.page);
  });
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  const pg=document.getElementById('page-'+id);
  if(pg)pg.classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>{if(t.dataset.page===id)t.classList.add('active');});

  html+='<div class="kpi-card"><div class="label">Tareas Activas</div><div class="value">'+activeTasks.length+'</div><div class="sub">excluyendo completadas y archivadas</div></div>';
  html+='<div class="kpi-card"><div class="label">Bloqueadas</div><div class="value" style="color:var(--red)">'+blocked.length+'</div><div class="sub">requieren acciÃ³n inmediata</div></div>';
  html+='<div class="kpi-card"><div class="label">Vencidas / Atrasadas</div><div class="value" style="color:var(--orange)">'+overdue.length+'</div><div class="sub">pasaron su fecha de tÃ©rmino</div></div>';
  html+='<div class="kpi-card"><div class="label">Clientes Activos</div><div class="value">'+clientsWithTasks.length+'</div><div class="sub">con tareas en el PeM</div></div>';
  html+='</div>';

  // Client cards sorted by health score (worst first)
  const sorted=clientsWithTasks.map(c=>({name:c,...healthScore(c),phase:currentPhase(c),tasks:clientTasks(c)})).sort((a,b)=>b.score-a.score);
  html+='<div class="section-title">Clientes por Health Score <span class="count">'+sorted.length+'</span></div>';
  html+='<div class="grid grid-3">';
  sorted.forEach(c=>{
    const active=c.tasks.filter(isActive);
    const blk=c.tasks.filter(t=>t.Estado.includes('Bloqueado')).length;
    const ovd=c.tasks.filter(isOverdue).length;
    const comp=c.tasks.filter(t=>t.Estado.includes('Completado')).length;
    html+='<div class="client-card" onclick="showPage(\''+c.name.replace(/\s/g,'-')+'\')">';
    html+='<div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:'+DATA.clientColors[c.name]+'"></span><span class="client-name">'+c.name+'</span></div>';
    html+='<div class="client-phase">'+c.phase+'</div>';
    html+='<div class="client-stats">';
    html+='<div class="client-stat"><span class="num" style="color:'+c.color+'">'+c.score+'</span><span class="lbl">Riesgo</span></div>';
    html+='<div class="client-stat"><span class="num">'+active.length+'</span><span class="lbl">Activas</span></div>';
    html+='<div class="client-stat"><span class="num" style="color:var(--red)">'+blk+'</span><span class="lbl">Bloq.</span></div>';
    html+='<div class="client-stat"><span class="num" style="color:var(--orange)">'+ovd+'</span><span class="lbl">Venc.</span></div>';
    html+='<div class="client-stat"><span class="num" style="color:var(--green)">'+comp+'</span><span class="lbl">OK</span></div>';
    html+='</div>';
    html+='<div class="health-bar"><div class="health-fill" style="width:'+(100-c.score)+'%;background:'+c.color+'"></div></div>';
    html+='</div>';
  });
  html+='</div></div>';

  // 2. CONTROL SEMANAL
  html+='<div class="page" id="page-control">';
  html+='<div class="section-title">Control Semanal â Tareas Activas <span class="count">'+activeTasks.length+'</span></div>';
  html+='<div class="card" style="overflow-x:auto"><table><thead><tr><th>Tarea</th><th>Cliente</th><th>Fase</th><th>Estado</th><th>Responsables</th><th>Fecha TÃ©rmino</th></tr></thead><tbody>';
  activeTasks.sort((a,b)=>{
    if(a.Estado.includes('Bloqueado'))return-1;if(b.Estado.includes('Bloqueado'))return 1;
    if(isOverdue(a)&&!isOverdue(b))return-1;if(!isOverdue(a)&&isOverdue(b))return 1;
    return 0;
  }).forEach(t=>{
    const od=isOverdue(t)?'style="color:var(--red);font-weight:600"':'';
    html+='<tr><td style="font-weight:600">'+t.Tarea+'</td><td>'+(t.Cliente||'â')+'</td><td>'+(t.Fase||'â')+'</td><td>'+stateBadge(t.Estado)+'</td><td style="font-size:11px">'+(t.Responsables.length?t.Responsables.join(', '):'â')+'</td><td '+od+'>'+(t.FechaTermino||'â')+'</td></tr>';
  });
  html+='</tbody></table></div></div>';

  // 3. RIESGO ACTUAL
  const riskTasks=DATA.tasks.filter(t=>isOverdue(t));
  html+='<div class="page" id="page-riesgo">';
  html+='<div class="section-title">Riesgo Actual â Tareas Vencidas <span class="count">'+riskTasks.length+'</span></div>';
  if(riskTasks.length){
    html+='<div class="card" style="overflow-x:auto"><table><thead><tr><th>Tarea</th><th>Cliente</th><th>Fase</th><th>Estado</th><th>Fecha TÃ©rmino</th><th>DÃ­as Vencida</th></tr></thead><tbody>';
    riskTasks.forEach(t=>{
      const days=Math.ceil((today-new Date(t.FechaTermino))/(1000*60*60*24));
      html+='<tr><td style="font-weight:600">'+t.Tarea+'</td><td>'+(t.Cliente||'â')+'</td><td>'+(t.Fase||'â')+'</td><td>'+stateBadge(t.Estado)+'</td><td style="color:var(--red)">'+t.FechaTermino+'</td><td style="color:var(--red);font-weight:700">'+days+' dÃ­as</td></tr>';
    });
    html+='</tbody></table></div>';
  } else {
    html+='<div class="card empty-state">No hay tareas vencidas actualmente</div>';
  }
  html+='</div>';

  // 4. CLIENTES EN RIESGO
  html+='<div class="page" id="page-clientes-riesgo">';
  html+='<div class="section-title">Clientes en Riesgo <span class="count">'+blocked.length+' bloqueadas</span></div>';
  DATA.clients.forEach(c=>{
    const risk=clientTasks(c).filter(t=>t.Estado.includes('Bloqueado')||t.Estado.includes('RevisiÃ³n'));
    if(!risk.length)return;
    html+='<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="width:10px;height:10px;border-radius:50%;background:'+DATA.clientColors[c]+'"></span><strong>'+c+'</strong></div>';
    risk.forEach(t=>{
      html+='<div class="task-item"><div class="task-item-header"><span class="task-item-name">'+t.Tarea+'</span>'+stateBadge(t.Estado)+'</div>';
      html+='<div style="font-size:12px;color:var(--text-dim)">'+t.Fase+'</div>';
      if(t.Bloqueado)html+='<div class="task-item-notes" style="color:var(--red)"><strong>Bloqueado por:</strong> '+t.Bloqueado+'</div>';
      if(t.Notas)html+='<div class="task-item-notes">'+t.Notas+'</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  if(!blocked.length)html+='<div class="card empty-state">No hay clientes con tareas bloqueadas</div>';
  html+='</div>';

  // 5. FLUJO POR FASE
  html+='<div class="page" id="page-flujo">';
  html+='<div class="section-title">Flujo por Fase â Estado actual de cada cliente</div>';
  html+='<div class="card">';
  DATA.phases.forEach(phase=>{
    const tasksInPhase=DATA.tasks.filter(t=>t.Fase===phase&&isActive(t));
    const clientsInPhase=[...new Set(tasksInPhase.map(t=>t.Cliente).filter(Boolean))];
    html+='<div class="phase-row">';
    html+='<div class="phase-label">'+phase+'</div>';
    html+='<div class="phase-clients">';
    if(clientsInPhase.length){
      clientsInPhase.forEach(c=>{
        const ct=tasksInPhase.filter(t=>t.Cliente===c);
        const hasBlocked=ct.some(t=>t.Estado.includes('Bloqueado'));
        const hasOverdue=ct.some(isOverdue);
        const border=hasBlocked?'2px solid var(--red)':hasOverdue?'2px solid var(--orange)':'none';
        html+='<div class="phase-dot" style="background:'+DATA.clientColors[c]+';border:'+border+'" data-tip="'+c+' ('+ct.length+' tareas)" onclick="showPage(\''+c.replace(/\s/g,'-')+'\')">'+c.charAt(0)+'</div>';
      });
    } else {
      html+='<span style="font-size:11px;color:var(--text-dim)">â</span>';
    }
    html+='</div></div>';
  });
  html+='</div></div>';

  // 6. PATRONES
  html+='<div class="page" id="page-patrones">';
  html+='<div class="section-title">Patrones Detectados</div>';
  html+='<div class="grid grid-2">';
  // Auto-detect patterns
  const patterns=[];
  // Pattern: Clients with blocked tasks
  const blockedClients=[...new Set(blocked.map(t=>t.Cliente).filter(Boolean))];
  if(blockedClients.length)patterns.push({title:'Bloqueos por dependencias externas',desc:'Clientes con tareas bloqueadas por factores externos (proveedores, accesos de servidor, etc.)',affected:blockedClients,severity:'high'});
  // Pattern: Overdue tasks
  const overdueClients=[...new Set(overdue.map(t=>t.Cliente).filter(Boolean))];
  if(overdueClients.length)patterns.push({title:'Tareas vencidas sin actualizar',desc:'Tareas que ya pasaron su fecha de tÃ©rmino y siguen activas.',affected:overdueClients,severity:'high'});
  // Pattern: Clients in early phases
  const earlyPhase=DATA.clients.filter(c=>{
    const tasks=clientTasks(c).filter(t=>isActive(t)&&t.Fase);
    if(!tasks.length)return false;
    const maxIdx=Math.max(...tasks.map(t=>DATA.phases.indexOf(t.Fase)));
    return maxIdx<=3;
  });
  if(earlyPhase.length)patterns.push({title:'Clientes en fases tempranas',desc:earlyPhase.length+' clientes aÃºn no pasan de Fase 4 (Integraciones).',affected:earlyPhase,severity:'info'});
  // Pattern: Tasks without dates
  const noDate=DATA.tasks.filter(t=>isActive(t)&&!t.FechaTermino&&t.Tipo==='Tarea');
  if(noDate.length>3)patterns.push({title:'Tareas sin fecha de tÃ©rmino',desc:noDate.length+' tareas activas sin fecha de tÃ©rmino definida.',affected:[...new Set(noDate.map(t=>t.Cliente).filter(Boolean))],severity:'medium'});
  // Pattern: Multiple active phases
  const multiPhase=DATA.clients.filter(c=>{
    const phases=[...new Set(clientTasks(c).filter(t=>isActive(t)&&t.Fase).map(t=>t.Fase))];
    return phases.length>=3;
  });
  if(multiPhase.length)patterns.push({title:'Clientes con mÃºltiples fases simultÃ¡neas',desc:'Clientes trabajando en 3+ fases a la vez â posible dispersiÃ³n de esfuerzo.',affected:multiPhase,severity:'medium'});

  patterns.forEach(p=>{
    const bc=p.severity==='high'?'var(--red)':p.severity==='medium'?'var(--orange)':'var(--blue)';
    html+='<div class="pattern-card" style="border-left-color:'+bc+'"><div class="pattern-title">'+p.title+'</div><div class="pattern-desc">'+p.desc+'</div><div class="affected">'+p.affected.map(a=>'<span class="badge badge-gray">'+a+'</span>').join('')+'</div></div>';
  });
  if(!patterns.length)html+='<div class="empty-state">No se detectaron patrones significativos</div>';
  html+='</div></div>';

  // 7. CLIENT PAGES
  DATA.clients.forEach(c=>{
    const tasks=clientTasks(c);
    if(!tasks.length)return;
    const active=tasks.filter(isActive);
    const h=healthScore(c);
    const id=c.replace(/\s/g,'-');

    html+='<div class="page" id="page-'+id+'">';
    // Header
    html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><span style="width:14px;height:14px;border-radius:50%;background:'+DATA.clientColors[c]+'"></span><h2 style="font-size:22px;font-weight:700">'+c+'</h2><span class="badge" style="background:'+h.color+'20;color:'+h.color+'">Riesgo: '+h.score+' â '+h.label+'</span></div>';

    // KPIs
    html+='<div class="grid grid-4" style="margin-bottom:24px">';
    html+='<div class="kpi-card"><div class="label">Fase Actual</div><div class="value" style="font-size:16px;margin-top:8px">'+currentPhase(c)+'</div></div>';
    html+='<div class="kpi-card"><div class="label">Tareas Activas</div><div class="value">'+active.length+'</div></div>';
    html+='<div class="kpi-card"><div class="label">Bloqueadas</div><div class="value" style="color:var(--red)">'+tasks.filter(t=>t.Estado.includes('Bloqueado')).length+'</div></div>';
    html+='<div class="kpi-card"><div class="label">Vencidas</div><div class="value" style="color:var(--orange)">'+tasks.filter(isOverdue).length+'</div></div>';
    html+='</div>';

    // Tasks by phase
    const phases=[...new Set(tasks.map(t=>t.Fase).filter(Boolean))].sort((a,b)=>DATA.phases.indexOf(a)-DATA.phases.indexOf(b));
    phases.forEach(phase=>{
      const pTasks=tasks.filter(t=>t.Fase===phase);
      html+='<div class="detail-section"><h3>'+phase+' <span class="count">'+pTasks.length+'</span></h3>';
      pTasks.forEach(t=>{
        html+='<div class="task-item"><div class="task-item-header"><span class="task-item-name">'+t.Tarea+'</span><span>'+stateBadge(t.Estado)+'</span></div>';
        const meta=[];
        if(t.FechaInicio)meta.push('Inicio: '+t.FechaInicio);
        if(t.FechaTermino)meta.push('TÃ©rmino: '+t.FechaTermino);
        if(t.Responsables.length)meta.push('Resp: '+t.Responsables.join(', '));
        if(meta.length)html+='<div style="font-size:11px;color:var(--text-dim);margin-top:4px">'+meta.join(' Â· ')+'</div>';
        if(t.Bloqueado)html+='<div class="task-item-notes" style="color:var(--red)"><strong>Bloqueado por:</strong> '+t.Bloqueado+'</div>';
        if(t.Notas)html+='<div class="task-item-notes">'+t.Notas+'</div>';
        html+='</div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });

  main.innerHTML=html;
}

buildNav();
render();
showPage('overview');
</script>
</body>
</html>
